<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Emulador Libre de Geo OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        body { background: #030508; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        .phone-shell { background: #0d0d0d; border-radius: 40px; border: 4px solid #333; padding: 20px 10px; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; width: 375px; height: 812px; }
        .phone-screen { background: #000; border-radius: 30px; overflow: hidden; width: 100%; height: 100%; position: relative; }
        .phone-notch { width: 120px; height: 25px; background: #0d0d0d; border-radius: 0 0 20px 20px; margin: 0 auto; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; justify-content: center; align-items: center; }
        .camera-lens { width: 10px; height: 10px; border-radius: 50%; background: #111; border: 1px solid #333; box-shadow: inset 0 0 2px rgba(255,255,255,0.2); }
        .cam-video { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:none; z-index: 5; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="mb-4 flex gap-4 bg-white/5 p-3 rounded-xl border border-white/10 backdrop-blur">
        <div class="text-sm opacity-50 flex items-center justify-center font-bold mr-4"><i class="fas fa-mobile-alt mr-2"></i> GEO EMULATOR STANDALONE</div>
        <button onclick="toggleCamera('user')" class="px-4 py-2 bg-blue-500/20 text-blue-400 rounded-lg text-xs hover:bg-blue-500 hover:text-white transition-all"><i class="fas fa-user-circle"></i> CAM FRONTAL</button>
        <button onclick="toggleCamera('environment')" class="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg text-xs hover:bg-green-500 hover:text-white transition-all"><i class="fas fa-camera"></i> CAM TRASERA</button>
        <button onclick="stopCamera()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-xs hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-stop"></i> PARAR CAM</button>
    </div>

    <div class="phone-shell">
        <div class="phone-notch"><div class="camera-lens"></div></div>
        <div class="phone-screen">
            <video id="webcam" class="cam-video" autoplay playsinline></video>
            <iframe id="geo-iframe" src="http://localhost:8000/pantalla-movil" class="w-full h-full border-none relative z-10" style="background:transparent" allow="geolocation; microphone; camera;"></iframe>
        </div>
    </div>

    <script>
        let currentStream = null;
        async function toggleCamera(facingMode) {
            stopCamera();
            try {
                const constraints = { video: { facingMode: facingMode } };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('webcam');
                video.srcObject = currentStream;
                video.style.display = 'block';
                // Hacer el iframe semi-transparente para poder ver la cámara detrás
                document.getElementById('geo-iframe').style.opacity = '0.85';
            } catch (err) {
                alert("Error accediendo a cámara: " + err.message);
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            document.getElementById('webcam').style.display = 'none';
            document.getElementById('geo-iframe').style.opacity = '1';
        }
    </script>
</body>
</html>
